<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="85" fill="none"/>
  
  <!-- Teal/Cyan curved arrow (top-left) -->
  <path d="M 50 60 Q 80 30 120 50" stroke="#17B8A0" stroke-width="20" fill="none" stroke-linecap="round"/>
  <polygon points="120,50 140,35 130,65" fill="#17B8A0"/>
  
  <!-- Yellow/Orange curved arrow (right) -->
  <path d="M 150 70 Q 140 120 120 150" stroke="#FFA500" stroke-width="20" fill="none" stroke-linecap="round"/>
  <polygon points="120,150 105,160 135,155" fill="#FFA500"/>
  
  <!-- Center circle with icons -->
  <circle cx="100" cy="100" r="45" fill="#17B8A0"/>
  <circle cx="100" cy="100" r="40" fill="#0E88A0"/>
  
  <!-- Gear icon (top-left) -->
  <circle cx="80" cy="85" r="6" fill="white"/>
  <rect x="75" y="70" width="10" height="8" fill="white" rx="1"/>
  <rect x="75" y="100" width="10" height="8" fill="white" rx="1"/>
  <rect x="65" y="80" width="8" height="10" fill="white" rx="1"/>
  <rect x="95" y="80" width="8" height="10" fill="white" rx="1"/>
  
  <!-- Lightbulb icon (bottom-left) -->
  <circle cx="82" cy="115" r="5" fill="white"/>
  <path d="M 78 120 Q 78 125 82 125 Q 86 125 86 120" stroke="white" stroke-width="2" fill="none"/>
  <rect x="80" y="125" width="4" height="4" fill="white"/>
  
  <!-- Orange outer ring -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="#FFA500" stroke-width="3" stroke-dasharray="5,5" opacity="0.6"/>
  
  <!-- Message/Chat bubble icon (right side) -->
  <path d="M 115 95 Q 125 95 125 85 Q 125 75 115 75 Q 105 75 105 85 L 105 95 L 100 100" fill="#FFA500" opacity="0.8"/>
  <circle cx="115" cy="80" r="2" fill="white"/>
  <circle cx="120" cy="80" r="2" fill="white"/>
  
  <!-- Handshake icon (bottom-right) -->
  <path d="M 110 115 Q 120 110 130 115" stroke="#FFA500" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="115" cy="118" r="2" fill="#FFA500"/>
  <circle cx="125" cy="118" r="2" fill="#FFA500"/>
</svg>